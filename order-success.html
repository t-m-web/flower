<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Confirmed — Flower By Ellyse</title>
<meta name="description" content="Thank you for your order!">
<link rel="icon" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="site-header"></div>

<section class="section">
  <div class="container">
    <div class="success-card" id="card">
      <div class="success-icon">✓</div>
      <h1>Thank You for Your Order!</h1>
      <p class="muted">Your bouquet is being lovingly prepared. We've sent a confirmation to your phone and email.</p>
      <div class="order-meta" id="meta"></div>
      <div class="hero-ctas" style="justify-content:center">
        <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
        <a href="https://wa.me/639566504470" class="btn btn-outline">Message Us</a>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome("");
const order = JSON.parse(localStorage.getItem("fbe_lastOrder")||"null");
const meta = document.getElementById("meta");
if(!order){
  meta.innerHTML = `<div>No recent order found. <a href="shop.html">Shop now →</a></div>`;
} else {
  meta.innerHTML = `
    <div><b>Order Number:</b> ${order.orderNo}</div>
    <div><b>Customer:</b> ${order.customer.name} · ${order.customer.phone}</div>
    <div><b>Delivery:</b> ${order.delivery.address}, ${order.delivery.city} on ${order.delivery.date} (${order.delivery.time})</div>
    <div><b>Payment:</b> ${order.payment}</div>
    <div><b>Items:</b><br>${order.items.map(i=>`• ${i.name} × ${i.qty} — ${fmt(i.lineTotal)}`).join("<br>")}</div>
    <div style="font-family:var(--serif);font-size:1.1rem;color:var(--rose-gold)"><b>Total Paid:</b> ${fmt(order.total)}</div>`;
}
</script>
</body>
</html>
