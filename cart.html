<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Cart — Flower By Ellyse</title>
<meta name="description" content="Review your selected bouquets and proceed to checkout.">
<link rel="icon" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="site-header"></div>

<section class="page-head">
  <div class="container"><h1>Shopping Cart</h1>
    <p class="crumbs"><a href="index.html">Home</a> / Cart</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="cart-grid" id="cartGrid"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome("");
const COUPON_KEY = "fbe_coupon";
const COUPONS = { "ELLYSE10": 0.10, "BLOOM15": 0.15 };

function render(){
  const items = Cart.get();
  const root = document.getElementById("cartGrid");
  if(!items.length){
    root.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <h2>Your cart is empty</h2>
      <p>Discover our fresh, hand-tied bouquets.</p>
      <a class="btn btn-primary" href="shop.html">Browse Bouquets</a></div>`;
    return;
  }
  const sub = Cart.subtotal();
  const coupon = localStorage.getItem(COUPON_KEY);
  const discount = coupon && COUPONS[coupon] ? sub * COUPONS[coupon] : 0;
  const fee = sub - discount >= 3000 ? 0 : SHOP.deliveryFee;
  const total = sub - discount + fee;
  root.innerHTML = `
    <div class="cart-list">
      ${items.map(i=>{
        const p = PRODUCTS.find(x=>x.id===i.id); if(!p) return "";
        return `
          <div class="cart-row">
            <img src="${p.img}" alt="${p.name}">
            <div>
              <div class="name"><a href="product.html?id=${p.id}" style="color:inherit">${p.name}</a></div>
              <div class="desc">${p.short}</div>
            </div>
            <div class="qty">
              <button data-act="dec" data-id="${p.id}">−</button>
              <input value="${i.qty}" data-id="${p.id}" data-act="set">
              <button data-act="inc" data-id="${p.id}">+</button>
            </div>
            <div class="price">${fmt(p.price * i.qty)}</div>
            <button class="remove" data-act="rm" data-id="${p.id}" aria-label="Remove">✕</button>
          </div>`;
      }).join("")}
    </div>
    <aside class="summary">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span>${fmt(sub)}</span></div>
      ${discount?`<div class="summary-row" style="color:#1b8c4a"><span>Coupon (${coupon})</span><span>−${fmt(discount)}</span></div>`:""}
      <div class="summary-row"><span>Delivery</span><span>${fee?fmt(fee):"Free"}</span></div>
      <div class="summary-row total"><span>Grand Total</span><span>${fmt(total)}</span></div>
      <div class="coupon">
        <input id="coupon" placeholder="Coupon code" value="${coupon||''}">
        <button class="btn btn-outline btn-sm" id="applyCoupon">Apply</button>
      </div>
      <div class="cart-actions">
        <a class="btn btn-outline btn-block" href="shop.html">Continue Shopping</a>
        <a class="btn btn-primary btn-block" href="checkout.html">Proceed to Checkout</a>
      </div>
    </aside>
  `;

  root.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click", e=>{
      const id = el.dataset.id, act = el.dataset.act;
      const cur = Cart.get().find(i=>i.id===id);
      if(act==="inc") Cart.update(id, (cur?.qty||1)+1);
      if(act==="dec") Cart.update(id, (cur?.qty||1)-1);
      if(act==="rm")  Cart.remove(id);
      if(act==="inc"||act==="dec"||act==="rm") render();
    });
    if(el.dataset.act==="set"){
      el.addEventListener("change", e=>{
        Cart.update(el.dataset.id, +el.value || 1);
        render();
      });
    }
  });
  document.getElementById("applyCoupon").onclick = ()=>{
    const code = document.getElementById("coupon").value.trim().toUpperCase();
    if(!code){ localStorage.removeItem(COUPON_KEY); render(); return; }
    if(COUPONS[code]){ localStorage.setItem(COUPON_KEY, code); toast(`Coupon ${code} applied`); }
    else { toast("Invalid coupon code"); }
    render();
  };
}
render();
</script>
</body>
</html>
