<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact — Flower By Ellyse</title>
<meta name="description" content="Visit, call, WhatsApp, or message us. We're on Jones Avenue, Cebu City and open daily.">
<link rel="icon" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="site-header"></div>

<section class="page-head"><div class="container">
  <span class="eyebrow">We'd love to hear from you</span><h1>Contact Us</h1>
  <p class="crumbs"><a href="index.html">Home</a> / Contact</p>
</div></section>

<section class="section">
  <div class="container">
    <div class="contact-grid">
      <div>
        <div class="info-card">
          <div class="row"><div class="ico">📍</div><div><b>Address</b><br>Jones Avenue Fuente, Cebu City, Philippines, 5600</div></div>
          <div class="row"><div class="ico">📞</div><div><b>Phone & WhatsApp</b><br><a href="tel:+639566504470">+63 956 650 4470</a></div></div>
          <div class="row"><div class="ico">✉️</div><div><b>Email</b><br><a href="mailto:hello@flowerbyellyse.ph">hello@flowerbyellyse.ph</a></div></div>
          <div class="row"><div class="ico">🕒</div><div><b>Hours</b><br>Daily · 8:00 AM – 8:00 PM</div></div>
        </div>
        <div class="map" style="margin-top:18px">
          <iframe loading="lazy" title="Map to Flower By Ellyse"
            src="https://maps.google.com/maps?q=Jones%20Avenue%20Fuente%20Cebu%20City&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>
        </div>
      </div>
      <div class="form-card">
        <h3>Send us a message</h3>
        <form id="contactForm" novalidate>
          <div class="grid-2">
            <div class="field"><label>Name *</label><input name="name" required></div>
            <div class="field"><label>Email *</label><input type="email" name="email" required></div>
          </div>
          <div class="field"><label>Phone</label><input type="tel" name="phone"></div>
          <div class="field"><label>Message *</label><textarea name="message" required placeholder="How can we help?"></textarea></div>
          <button class="btn btn-primary" type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
mountChrome("contact");
document.getElementById("contactForm").addEventListener("submit", e=>{
  e.preventDefault();
  if(!e.target.checkValidity()){ e.target.reportValidity(); return; }
  const f = new FormData(e.target);
  const msg = encodeURIComponent(`📨 New inquiry\nName: ${f.get('name')}\nEmail: ${f.get('email')}\nPhone: ${f.get('phone')||'—'}\n\n${f.get('message')}`);
  window.open(`https://wa.me/${SHOP.whatsapp}?text=${msg}`, "_blank");
  toast("Message sent — opening WhatsApp");
  e.target.reset();
});
</script>
</body>
</html>
